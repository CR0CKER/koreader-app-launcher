name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only by default; jobs need nothing more.
permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Install pinned tooling
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check scripts/
      - name: Format check (ruff)
        run: ruff format --check scripts/
      - name: Type check (mypy --strict)
        run: mypy
      - name: Tests (pytest)
        run: pytest

  lua:
    name: Lua (luacheck)
    runs-on: ubuntu-latest
    # Pinned by digest — pipelinecomponents/luacheck ships luacheck on LuaJIT.
    container:
      image: docker.io/pipelinecomponents/luacheck@sha256:29b50ed2cb99e4eea19522f0c9b3b104661437e0b5158921df2d111eb6c5af2e
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Lint plugin (luacheck)
        run: luacheck applauncher.koplugin/
