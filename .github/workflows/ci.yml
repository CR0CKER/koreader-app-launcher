name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only by default; jobs need nothing more.
permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - name: Install pinned tooling
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check scripts/
      - name: Format check (ruff)
        run: ruff format --check scripts/
      - name: Type check (mypy --strict)
        run: mypy
      - name: Tests (pytest)
        run: pytest

  lua:
    name: Lua (luacheck)
    runs-on: ubuntu-latest
    # Pinned by digest — pipelinecomponents/luacheck ships luacheck on LuaJIT.
    container:
      image: docker.io/pipelinecomponents/luacheck@sha256:29b50ed2cb99e4eea19522f0c9b3b104661437e0b5158921df2d111eb6c5af2e
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Lint plugin (luacheck)
        run: luacheck applauncher.koplugin/
